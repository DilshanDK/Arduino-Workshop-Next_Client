name: Build and Deploy to VPS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image tag name
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/arduino-workshop"
          echo "IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            FRONTEND_ENV=${{ secrets.frontend_env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lowercase image tag name
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/arduino-workshop"
          echo "IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Transfer the docker-compose.yml to the VPS
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/home/ubuntu/Projects/arduino-workshop/"

      # SSH to the VPS and run docker compose
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # If package is private, login to GHCR using a Personal Access Token (PAT)
            # You can set secrets.GHCR_PAT in your repo settings. If public, login is optional.
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi
            
            mkdir -p /home/ubuntu/Projects/arduino-workshop
            cd /home/ubuntu/Projects/arduino-workshop
            
            # Dynamically replace the image name in the copied docker-compose.yml to match the built image name
            sed -i "s|image:.*|image: ${{ env.IMAGE_NAME }}:latest|g" docker-compose.yml
            
            # Pull the fresh image and restart the container
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Prune unused images to save disk space on VPS
            docker image prune -f
